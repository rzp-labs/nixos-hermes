name: Pre-PR verification

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pre-pr-verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  mechanical-verify:
    name: Mechanical pre-PR verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Run mechanical pre-PR checks
        run: tools/pre-pr-verify.sh --quick
