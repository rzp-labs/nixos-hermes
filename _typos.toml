[files]
# .gitignore uses glob character-class patterns like [Ii]nclude, [Ss]cripts
# that typos incorrectly flags as misspellings.
# den/hosts/nixos-hermes/secrets/payload/ and tests/assets/ contain SOPS ciphertext which
# triggers false positives on random byte sequences in base64.
extend-exclude = [".gitignore", "den/hosts/nixos-hermes/secrets/payload/", "tests/assets/", "assets/"]

[default.extend-identifiers]
# Netdata's MCP bridge package path uses the upstream abbreviation "nd".
nd = "nd"
ndMcpBridge = "ndMcpBridge"

[default.extend-words]
# Netdata's MCP bridge package path uses the upstream abbreviation "nd".
nd = "nd"
# Den's public API uses `den.ful.<namespace>` for reusable aspect libraries.
ful = "ful"
